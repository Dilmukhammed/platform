# Nixpacks config for Bun + Next.js on Railway
# bcrypt needs node-gyp → python3 + nodejs provide the native build toolchain
[phases.setup]
nixPkgs = ["bun", "python3", "nodejs"]

[phases.install]
cmds = ["npm install -g node-gyp", "bun install --frozen-lockfile"]

[phases.build]
cmds = ["bun run build"]

[start]
cmd = "bun run start"
