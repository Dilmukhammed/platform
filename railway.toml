# Railway deployment config
# Docs: https://docs.railway.com/reference/config-as-code

[build]
builder = "nixpacks"
buildCommand = "bun install --frozen-lockfile && bun run build"

[deploy]
startCommand = "bun run start"
healthcheckPath = "/api/v1/health"

# Railway auto-detects Next.js, but we pin Bun as the runtime
# since Nixpacks supports Bun out of the box
